name: ${AIRFLOW_COMPOSE_PROJECT:-data-platform-airflow}

x-airflow-common: &airflow-common
  image: ${DATA_PLATFORM_AIRFLOW_IMAGE:?set DATA_PLATFORM_AIRFLOW_IMAGE in DATA_PLATFORM_ENV_FILE}
  user: "${AIRFLOW_UID:-50000}:0"
  group_add:
    - "${DOCKER_GID:-0}"
  env_file:
    - ${DATA_PLATFORM_ENV_FILE:?set DATA_PLATFORM_ENV_FILE}
  environment:
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://api-server:8080/execution/
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/auth/simple_auth_manager_passwords.json.generated
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USERNAME}:admin
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    DATA_PLATFORM_DBT_IMAGE: ${DATA_PLATFORM_DBT_IMAGE:?set DATA_PLATFORM_DBT_IMAGE in DATA_PLATFORM_ENV_FILE}
    DATA_PLATFORM_SCRIPTS_IMAGE: ${DATA_PLATFORM_SCRIPTS_IMAGE:?set DATA_PLATFORM_SCRIPTS_IMAGE in DATA_PLATFORM_ENV_FILE}
    DATA_PLATFORM_WREMOTELY_ETL_IMAGE: ${DATA_PLATFORM_WREMOTELY_ETL_IMAGE:?set DATA_PLATFORM_WREMOTELY_ETL_IMAGE in DATA_PLATFORM_ENV_FILE}
  volumes:
    - airflow-auth:/opt/airflow/auth
    - airflow-logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

x-airflow-ready: &airflow-ready
  postgres:
    condition: service_healthy
  airflow-init:
    condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: ["bash", "-c", "airflow db migrate"]
    restart: "no"

  api-server:
    <<: *airflow-common
    command: api-server
    depends_on: *airflow-ready
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "${AIRFLOW_API_PORT:-8080}:8080"

  dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on: *airflow-ready
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on: *airflow-ready
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on: *airflow-ready
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  airflow-auth:
  airflow-logs:
  postgres-data:
