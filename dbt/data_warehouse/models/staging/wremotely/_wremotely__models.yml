version: 2

models:
  - name: stg_wremotely__job_url_selection_results
    description: Job URL selection decisions unpacked from the raw staged envelope.
    columns:
      - name: stage_run_id
        data_tests:
          - not_null
      - name: selection_run_id
        data_tests:
          - not_null
      - name: source_record_index
        data_tests:
          - not_null
      - name: job_url_id
        data_tests:
          - not_null
      - name: candidate_id
        data_tests:
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: selection_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'SELECTED'
                  - 'SKIPPED_DUPLICATE_URL_IDENTITY'
                  - 'SKIPPED_KNOWN_URL'
                  - 'SKIPPED_SELECTION_LIMIT'
      - name: selection_reason
        data_tests:
          - not_null
      - name: known_url_match
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: duplicate_url_identity
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: stg_wremotely__selected_job_urls
    description: Selected job URLs unpacked from the raw staged envelope.
    columns:
      - name: stage_run_id
        data_tests:
          - not_null
      - name: selection_run_id
        data_tests:
          - not_null
      - name: source_record_index
        data_tests:
          - not_null
      - name: candidate_id
        data_tests:
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: source_job_url_id
        data_tests:
          - not_null
      - name: source_crawl_run_id
        data_tests:
          - not_null
      - name: selected_at
        data_tests:
          - not_null
      - name: selector_version
        data_tests:
          - not_null

  - name: stg_wremotely__extraction_page_results
    description: Page retrieval outcomes unpacked from the raw staged envelope.
    columns:
      - name: stage_run_id
        data_tests:
          - not_null
      - name: extraction_run_id
        data_tests:
          - not_null
      - name: source_record_index
        data_tests:
          - not_null
      - name: candidate_id
        data_tests:
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: page_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SUCCEEDED', 'FAILED']
      - name: retrieved_at
        data_tests:
          - not_null
      - name: robots_txt_allowed
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: stg_wremotely__job_facts
    description: Job facts unpacked from retrieved job pages.
    columns:
      - name: stage_run_id
        data_tests:
          - not_null
      - name: job_facts_run_id
        data_tests:
          - not_null
      - name: source_record_index
        data_tests:
          - not_null
      - name: candidate_id
        data_tests:
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: job_fact_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['EXTRACTED', 'SKIPPED_EXTRACTION_FAILED']
      - name: job_fact_extracted_at
        data_tests:
          - not_null
      - name: job_fact_extractor_version
        data_tests:
          - not_null
      - name: raw_work_arrangement
        data_tests:
          - accepted_values:
              arguments:
                values: ['REMOTE', 'HYBRID', 'ONSITE', 'UNKNOWN']
      - name: source_default_work_arrangement
        data_tests:
          - accepted_values:
              arguments:
                values: ['REMOTE', 'HYBRID', 'ONSITE', 'UNKNOWN']
      - name: source_default_country_eligibility_scope
        data_tests:
          - accepted_values:
              arguments:
                values: ['GLOBAL', 'GLOBAL_EXCEPT', 'SPECIFIC', 'UNKNOWN']
      - name: record_updated_at
        data_tests:
          - not_null
      - name: record_updated_by_step
        data_tests:
          - not_null
      - name: raw_payload
        data_tests:
          - not_null

  - name: stg_wremotely__classification_classifications
    description: Job classification outcomes unpacked from the raw staged envelope.
    columns:
      - name: stage_run_id
        data_tests:
          - not_null
      - name: classification_run_id
        data_tests:
          - not_null
      - name: source_record_index
        data_tests:
          - not_null
      - name: candidate_id
        data_tests:
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: classified_at
        data_tests:
          - not_null
      - name: classification_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CLASSIFIED', 'NEEDS_REVIEW', 'QUARANTINED']
      - name: job_posting_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['JOB', 'NON_JOB', 'UNKNOWN']
      - name: remote_scope
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['REMOTE', 'HYBRID', 'ONSITE', 'UNKNOWN']
      - name: country_eligibility_scope
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['GLOBAL', 'GLOBAL_EXCEPT', 'SPECIFIC', 'UNKNOWN']
      - name: serving_decision
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PUBLISHABLE', 'NOT_PUBLISHABLE', 'NEEDS_REVIEW', 'QUARANTINE']

  - name: stg_wremotely__country_eligibility_extractions
    description: Raw country and region eligibility evidence unpacked from the raw staged envelope.
    columns:
      - name: stage_run_id
        data_tests:
          - not_null
      - name: classification_run_id
        data_tests:
          - not_null
      - name: source_record_index
        data_tests:
          - not_null
      - name: candidate_id
        data_tests:
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: extracted_at
        data_tests:
          - not_null
      - name: country_eligibility_extractor_version
        data_tests:
          - not_null
      - name: country_field_source
        data_tests:
          - not_null
      - name: country_field_role
        data_tests:
          - not_null
      - name: country_field_source_system
        data_tests:
          - not_null
      - name: country_field_source_identifier
        data_tests:
          - not_null
      - name: extraction_method
        data_tests:
          - not_null
      - name: raw_payload
        data_tests:
          - not_null

  - name: stg_wremotely__recheck_lifecycle_results
    description: Explicit lifecycle recheck outcomes unpacked from the raw staged envelope.
    columns:
      - name: stage_run_id
        data_tests:
          - not_null
      - name: recheck_run_id
        data_tests:
          - not_null
      - name: source_record_index
        data_tests:
          - not_null
      - name: candidate_id
        data_tests:
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: checked_at
        data_tests:
          - not_null
      - name: page_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SUCCEEDED', 'FAILED']
      - name: lifecycle_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CLOSED', 'REACHABLE', 'TERMINAL', 'UNKNOWN']
      - name: lifecycle_signal
        data_tests:
          - not_null
