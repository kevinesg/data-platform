version: 2

models:
  - name: int_wremotely__latest_selected_job_urls
    description: Latest selected job URL row for each candidate_id.
    columns:
      - name: candidate_id
        data_tests:
          - unique
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: latest_selected_at
        data_tests:
          - not_null
      - name: latest_selection_stage_run_id
        data_tests:
          - not_null
      - name: latest_selection_run_id
        data_tests:
          - not_null

  - name: int_wremotely__latest_extraction_page_results
    description: Latest page retrieval and parser result for each candidate_id.
    columns:
      - name: candidate_id
        data_tests:
          - unique
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: latest_page_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SUCCEEDED', 'FAILED']
      - name: latest_extraction_stage_run_id
        data_tests:
          - not_null
      - name: latest_extraction_run_id
        data_tests:
          - not_null

  - name: int_wremotely__latest_job_facts
    description: Latest extracted job facts for each candidate_id.
    columns:
      - name: candidate_id
        data_tests:
          - unique
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: latest_job_fact_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['EXTRACTED', 'SKIPPED_EXTRACTION_FAILED']
      - name: latest_job_fact_extracted_at
        data_tests:
          - not_null
      - name: latest_job_fact_record_updated_at
        data_tests:
          - not_null
      - name: latest_job_fact_stage_run_id
        data_tests:
          - not_null
      - name: latest_job_facts_run_id
        data_tests:
          - not_null

  - name: int_wremotely__latest_classifications
    description: Latest classification result for each candidate_id.
    columns:
      - name: candidate_id
        data_tests:
          - unique
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: latest_classification_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CLASSIFIED', 'NEEDS_REVIEW', 'QUARANTINED']
      - name: latest_job_posting_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['JOB', 'NON_JOB', 'UNKNOWN']
      - name: latest_remote_scope
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['REMOTE', 'HYBRID', 'ONSITE', 'UNKNOWN']
      - name: latest_country_eligibility_scope
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['GLOBAL', 'GLOBAL_EXCEPT', 'SPECIFIC', 'UNKNOWN']
      - name: latest_serving_decision
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PUBLISHABLE', 'NOT_PUBLISHABLE', 'NEEDS_REVIEW', 'QUARANTINE']
      - name: latest_classification_stage_run_id
        data_tests:
          - not_null
      - name: latest_classification_run_id
        data_tests:
          - not_null

  - name: int_wremotely__latest_lifecycle_rechecks
    description: Latest explicit lifecycle recheck result for each candidate_id.
    columns:
      - name: candidate_id
        data_tests:
          - unique
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: latest_lifecycle_page_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SUCCEEDED', 'FAILED']
      - name: latest_lifecycle_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CLOSED', 'REACHABLE', 'TERMINAL', 'UNKNOWN']
      - name: previous_lifecycle_status
        description: Prior lifecycle result used to require repeated terminal evidence.
      - name: latest_lifecycle_signal
        data_tests:
          - not_null
      - name: latest_lifecycle_stage_run_id
        data_tests:
          - not_null
      - name: latest_lifecycle_recheck_run_id
        data_tests:
          - not_null

  - name: int_wremotely__current_candidate_facts
    description: >
      Current joined candidate facts from the latest discovery, extraction,
      classification, and lifecycle rows.
    columns:
      - name: candidate_id
        data_tests:
          - unique
          - not_null
      - name: url
        data_tests:
          - not_null
      - name: has_extraction
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_job_facts
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_selection
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_classification
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_lifecycle_recheck
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_country_eligibility_evidence
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: int_wremotely__country_eligibility_evidence
    description: >
      Raw country eligibility evidence mapped to reviewed country and group
      taxonomy when possible. Rows with unknown or invalid evidence stay visible
      for QA/RCA rather than being silently promoted.
    columns:
      - name: candidate_id
        data_tests:
          - not_null
      - name: evidence_direction
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['INCLUDED', 'EXCLUDED', 'GLOBAL', 'UNKNOWN']
      - name: match_source
        data_tests:
          - not_null

  - name: int_wremotely__candidate_country_eligibility
    description: Compact validated country eligibility facts at candidate grain.
    columns:
      - name: candidate_id
        data_tests:
          - unique
          - not_null
      - name: validated_country_eligibility_scope
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['GLOBAL', 'GLOBAL_EXCEPT', 'SPECIFIC', 'UNKNOWN']
      - name: eligible_country_codes
        data_tests:
          - not_null
      - name: excluded_country_codes
        data_tests:
          - not_null
      - name: country_eligibility_evidence_count
        data_tests:
          - not_null

  - name: int_wremotely__job_country_eligibility
    description: >
      Compact job-country bridge for explicit eligibility and explicit
      exclusions. Global jobs are represented by the candidate/job scope instead
      of one row per country.
    columns:
      - name: job_id
        data_tests:
          - not_null
      - name: country_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('wremotely__countries')
                field: country_code
      - name: eligibility_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ELIGIBLE', 'EXCLUDED']

  - name: int_wremotely__publishable_job_facts
    description: >
      Current job facts eligible for the tested pre-publication candidate set.
      Private publication holds are applied only after dbt finishes.
    columns:
      - name: job_id
        data_tests:
          - unique
          - not_null
      - name: canonical_url
        data_tests:
          - not_null
      - name: source_url
        data_tests:
          - not_null
      - name: title
        data_tests:
          - not_null
      - name: company_id
        description: >
          Nullable stable company identifier. It is populated only when both a
          non-empty source company name and source domain are available.
      - name: company_identity_basis
        description: Nullable identity version used to derive company_id.
      - name: company_identity_key
        description: Internal deterministic identity key hashed into company_id.
      - name: normalized_company_name
        description: Internal normalized company name used only for identity derivation.
      - name: company_identity_source_domain
        description: Internal normalized source domain used only for identity derivation.
      - name: remote_scope
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['REMOTE', 'HYBRID']
      - name: raw_work_arrangement
        description: Raw structured or source-derived work arrangement evidence when available.
        data_tests:
          - accepted_values:
              arguments:
                values: ['REMOTE', 'HYBRID', 'ONSITE', 'UNKNOWN']
      - name: country_eligibility_scope
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['GLOBAL', 'GLOBAL_EXCEPT', 'SPECIFIC']
      - name: eligible_country_codes
        data_tests:
          - not_null
      - name: excluded_country_codes
        data_tests:
          - not_null
      - name: included_country_group_codes
        data_tests:
          - not_null
      - name: excluded_country_group_codes
        data_tests:
          - not_null
      - name: country_eligibility_evidence_count
        data_tests:
          - not_null
      - name: job_description
        description: Full extracted job description when available. This field is not truncated.
      - name: base_salary_json
        description: Source base salary payload as JSON when available.
      - name: estimated_salary_json
        description: Source estimated salary payload as JSON when available.
      - name: employment_type
        description: Source employment type when available.
      - name: declared_language_tag
        description: Source-declared language tag when available.
      - name: has_lifecycle_recheck
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
