
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'data_warehouse'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'data_warehouse'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

seeds:
  data_warehouse:
    personal_finance:
      +schema: seed_personal_finance
      personal_finance__transaction_type_classification:
        +column_types:
          transaction_type: STRING
          cashflow_type: STRING
          is_income_deduction: BOOLEAN
    wremotely:
      +schema: seed_wremotely
      wremotely__search_tags:
        +column_types:
          tag_code: STRING
          tag_label: STRING
          match_pattern: STRING
      wremotely__countries:
        +column_types:
          country_code: STRING
          country_name: STRING
          alpha_3_code: STRING
          numeric_code: STRING
      wremotely__country_aliases:
        +column_types:
          country_code: STRING
          alias: STRING
          match_kind: STRING
      wremotely__country_groups:
        +column_types:
          country_group_code: STRING
          country_group_name: STRING
          scope_note: STRING
      wremotely__country_group_aliases:
        +column_types:
          country_group_code: STRING
          alias: STRING
      wremotely__country_group_memberships:
        +column_types:
          country_group_code: STRING
          country_code: STRING

models:
  data_warehouse:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      personal_finance:
        +materialized: table
        +schema: mart_personal_finance
      wremotely:
        +materialized: table
        +schema: mart_wremotely
