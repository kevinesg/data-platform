name: publish-images

# Publish immutable runtime images only after the matching component CI workflow
# succeeds on main. Pull requests build images for validation, but do not push
# registry artifacts.

on:
  workflow_run:
    workflows:
      - scripts-ci
      - dbt-ci
      - airflow-ci
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      component:
        description: Component image to publish
        type: choice
        default: all
        options:
          - all
          - scripts
          - dbt
          - airflow

concurrency:
  group: publish-images-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY_PREFIX: ghcr.io/kevinesg
  IMAGE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  IMAGE_TAG: sha-${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  select:
    name: Select images
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      scripts: ${{ steps.select.outputs.scripts }}
      dbt: ${{ steps.select.outputs.dbt }}
      airflow: ${{ steps.select.outputs.airflow }}
    steps:
      - name: Select images to publish
        id: select
        shell: bash
        run: |
          set -euo pipefail

          scripts=false
          dbt=false
          airflow=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ github.event.inputs.component }}" in
              all)
                scripts=true
                dbt=true
                airflow=true
                ;;
              scripts)
                scripts=true
                ;;
              dbt)
                dbt=true
                ;;
              airflow)
                airflow=true
                ;;
            esac
          else
            case "${{ github.event.workflow_run.name }}" in
              scripts-ci)
                scripts=true
                ;;
              dbt-ci)
                dbt=true
                ;;
              airflow-ci)
                airflow=true
                ;;
            esac
          fi

          echo "scripts=$scripts" >> "$GITHUB_OUTPUT"
          echo "dbt=$dbt" >> "$GITHUB_OUTPUT"
          echo "airflow=$airflow" >> "$GITHUB_OUTPUT"

  publish-scripts:
    name: Publish scripts image
    needs:
      - select
    if: needs.select.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish scripts image
        uses: docker/build-push-action@v7
        with:
          context: scripts
          file: scripts/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_PREFIX }}/data-platform-scripts:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.IMAGE_SHA }}
            org.opencontainers.image.title=data-platform-scripts
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-dbt:
    name: Publish dbt image
    needs:
      - select
    if: needs.select.outputs.dbt == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish dbt image
        uses: docker/build-push-action@v7
        with:
          context: dbt
          file: dbt/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_PREFIX }}/data-platform-dbt:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.IMAGE_SHA }}
            org.opencontainers.image.title=data-platform-dbt
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-airflow:
    name: Publish Airflow image
    needs:
      - select
    if: needs.select.outputs.airflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Airflow image
        uses: docker/build-push-action@v7
        with:
          context: airflow
          file: airflow/Dockerfile
          push: true
          tags: ${{ env.REGISTRY_PREFIX }}/data-platform-airflow:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.IMAGE_SHA }}
            org.opencontainers.image.title=data-platform-airflow
          cache-from: type=gha
          cache-to: type=gha,mode=max
