name: deploy-qa

# Manual QA deployment to the self-hosted deployment runner. This deploys
# already-published immutable images; it does not build images or run prod work.

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy. Use main for the latest approved release.
        required: true
        default: main

concurrency:
  group: deploy-qa
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  QA_REPO_DIR: ${{ vars.QA_REPO_DIR }}
  QA_DATA_PLATFORM_ENV_FILE: ${{ vars.QA_DATA_PLATFORM_ENV_FILE }}
  QA_IMAGE_ENV_FILE: ${{ vars.QA_IMAGE_ENV_FILE }}
  REGISTRY_PREFIX: ghcr.io/kevinesg
  WREMOTELY_ETL_IMAGE_REPOSITORY: ghcr.io/kevinesg/wremotely-etl
  WREMOTELY_ETL_QA_CANDIDATE_IMAGE: ghcr.io/kevinesg/wremotely-etl:qa-candidate

jobs:
  deploy:
    name: Deploy QA Airflow
    runs-on:
      - self-hosted
      - linux
      - data-platform-qa
    timeout-minutes: 30
    environment: qa
    env:
      DEPLOY_GIT_REF: ${{ inputs.git_ref }}
    steps:
      - name: Resolve QA host paths
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "QA_REPO_DIR=${QA_REPO_DIR:-$HOME/qa/data-platform}"
            echo "QA_DATA_PLATFORM_ENV_FILE=${QA_DATA_PLATFORM_ENV_FILE:-$HOME/secrets/data-platform/qa/.env}"
            echo "QA_IMAGE_ENV_FILE=${QA_IMAGE_ENV_FILE:-$HOME/secrets/data-platform/qa/images.env}"
          } >> "$GITHUB_ENV"

      - name: Validate QA host state
        shell: bash
        run: |
          set -euo pipefail

          test -d "$QA_REPO_DIR/.git"
          test -f "$QA_DATA_PLATFORM_ENV_FILE"
          test -d "$(dirname "$QA_IMAGE_ENV_FILE")"

      - name: Update QA checkout
        shell: bash
        run: |
          set -euo pipefail

          cd "$QA_REPO_DIR"
          previous_sha="$(git rev-parse HEAD)"
          git fetch --prune origin

          if [[ "$DEPLOY_GIT_REF" == "main" ]]; then
            git switch main
            git pull --ff-only origin main
          else
            git checkout --detach "$DEPLOY_GIT_REF"
          fi

          echo "PREVIOUS_DEPLOY_SHA=$previous_sha" >> "$GITHUB_ENV"
          echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update QA image manifest
        shell: bash
        run: |
          set -euo pipefail

          cd "$QA_REPO_DIR"

          set_image_from_latest_published_tag() {
            local component="$1"
            local var_name="$2"
            shift 2
            local runtime_sha
            local image_sha
            local image

            runtime_sha="$(git log --first-parent -1 --format=%H "$DEPLOY_SHA" -- "$@")"
            if [[ -z "$runtime_sha" ]]; then
              echo "::error::No runtime change found for $component in git history."
              exit 1
            fi

            for image_sha in $(git rev-list --first-parent "$DEPLOY_SHA"); do
              image="$REGISTRY_PREFIX/data-platform-$component:sha-$image_sha"
              if docker manifest inspect "$image" >/dev/null 2>&1; then
                printf -v "$var_name" '%s' "$image"
                echo "Selected $component image: $image"
                return 0
              fi

              if [[ "$image_sha" == "$runtime_sha" ]]; then
                echo "::error::No published $component image found at or after latest runtime change $runtime_sha."
                exit 1
              fi
            done
          }

          set_image_from_latest_published_tag airflow DATA_PLATFORM_AIRFLOW_IMAGE \
            "airflow/**" \
            ":(exclude)airflow/*.md" \
            ":(exclude)airflow/**/*.md" \
            ":(exclude)airflow/.env.example" \
            ":(exclude)airflow/**/.gitignore" \
            ":(exclude)airflow/**/.gitkeep"
          set_image_from_latest_published_tag scripts DATA_PLATFORM_SCRIPTS_IMAGE \
            "scripts/**" \
            ":(exclude)scripts/*.md" \
            ":(exclude)scripts/**/*.md" \
            ":(exclude)scripts/.env.example" \
            ":(exclude)scripts/**/.gitignore" \
            ":(exclude)scripts/**/.gitkeep"
          set_image_from_latest_published_tag dbt DATA_PLATFORM_DBT_IMAGE \
            "dbt/**" \
            ":(exclude)dbt/*.md" \
            ":(exclude)dbt/**/*.md" \
            ":(exclude)dbt/.env.example" \
            ":(exclude)dbt/**/.gitignore" \
            ":(exclude)dbt/**/.gitkeep"

          docker pull "$WREMOTELY_ETL_QA_CANDIDATE_IMAGE"
          wremotely_etl_revision="$(
            docker image inspect "$WREMOTELY_ETL_QA_CANDIDATE_IMAGE" \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}'
          )"
          wremotely_etl_source="$(
            docker image inspect "$WREMOTELY_ETL_QA_CANDIDATE_IMAGE" \
              --format '{{ index .Config.Labels "org.opencontainers.image.source" }}'
          )"

          if [[ ! "$wremotely_etl_revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Private ETL QA candidate has an invalid revision label."
            exit 1
          fi
          if [[ "$wremotely_etl_source" != "https://github.com/kevinesg/wremotely-etl" ]]; then
            echo "::error::Private ETL QA candidate has an unexpected source label."
            exit 1
          fi

          DATA_PLATFORM_WREMOTELY_ETL_IMAGE="$WREMOTELY_ETL_IMAGE_REPOSITORY:sha-$wremotely_etl_revision"
          docker pull "$DATA_PLATFORM_WREMOTELY_ETL_IMAGE"

          immutable_revision="$(
            docker image inspect "$DATA_PLATFORM_WREMOTELY_ETL_IMAGE" \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}'
          )"
          if [[ "$immutable_revision" != "$wremotely_etl_revision" ]]; then
            echo "::error::Private ETL immutable image revision does not match QA candidate."
            exit 1
          fi
          if [[ "$(docker image inspect "$DATA_PLATFORM_WREMOTELY_ETL_IMAGE" --format '{{.Id}}')" != \
                "$(docker image inspect "$WREMOTELY_ETL_QA_CANDIDATE_IMAGE" --format '{{.Id}}')" ]]; then
            echo "::error::Private ETL immutable image does not match QA candidate."
            exit 1
          fi

          echo "Selected private ETL image: $DATA_PLATFORM_WREMOTELY_ETL_IMAGE"

          test -n "${DATA_PLATFORM_AIRFLOW_IMAGE:-}"
          test -n "${DATA_PLATFORM_SCRIPTS_IMAGE:-}"
          test -n "${DATA_PLATFORM_DBT_IMAGE:-}"
          test -n "${DATA_PLATFORM_WREMOTELY_ETL_IMAGE:-}"

          {
            printf 'DATA_PLATFORM_AIRFLOW_IMAGE=%s\n' "$DATA_PLATFORM_AIRFLOW_IMAGE"
            printf 'DATA_PLATFORM_SCRIPTS_IMAGE=%s\n' "$DATA_PLATFORM_SCRIPTS_IMAGE"
            printf 'DATA_PLATFORM_DBT_IMAGE=%s\n' "$DATA_PLATFORM_DBT_IMAGE"
            printf 'DATA_PLATFORM_WREMOTELY_ETL_IMAGE=%s\n' "$DATA_PLATFORM_WREMOTELY_ETL_IMAGE"
          } > "$QA_IMAGE_ENV_FILE"
          chmod 600 "$QA_IMAGE_ENV_FILE"

          cat "$QA_IMAGE_ENV_FILE"

      - name: Validate QA dbt compile
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source "$QA_IMAGE_ENV_FILE"
          source "$QA_DATA_PLATFORM_ENV_FILE"
          set +a

          test -n "${DATA_PLATFORM_DBT_IMAGE:-}"
          test -n "${DBT_GOOGLE_APPLICATION_CREDENTIALS:-}"
          test -f "$DBT_GOOGLE_APPLICATION_CREDENTIALS"

          docker pull "$DATA_PLATFORM_DBT_IMAGE"
          docker run --rm \
            --mount "type=bind,source=$DBT_GOOGLE_APPLICATION_CREDENTIALS,target=/credentials/dbt-service-account.json,readonly" \
            -e DBT_TARGET \
            -e PROJECT_ID \
            -e RAW_DATASET \
            -e DBT_DATASET \
            -e DBT_THREADS \
            -e BIGQUERY_LOCATION \
            -e DBT_GOOGLE_APPLICATION_CREDENTIALS=/credentials/dbt-service-account.json \
            "$DATA_PLATFORM_DBT_IMAGE" compile --project-dir data_warehouse --target "$DBT_TARGET"

      - name: Pull and start QA Airflow
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source "$QA_IMAGE_ENV_FILE"
          set +a

          docker manifest inspect "$DATA_PLATFORM_AIRFLOW_IMAGE" >/dev/null
          docker manifest inspect "$DATA_PLATFORM_SCRIPTS_IMAGE" >/dev/null
          docker manifest inspect "$DATA_PLATFORM_DBT_IMAGE" >/dev/null
          docker manifest inspect "$DATA_PLATFORM_WREMOTELY_ETL_IMAGE" >/dev/null

          # DockerOperator starts sibling containers through the host Docker daemon.
          # Pull task images here while the workflow is logged in to GHCR so Airflow
          # does not need registry credentials inside the scheduler container.
          docker pull "$DATA_PLATFORM_AIRFLOW_IMAGE"
          docker pull "$DATA_PLATFORM_SCRIPTS_IMAGE"
          docker pull "$DATA_PLATFORM_DBT_IMAGE"
          docker pull "$DATA_PLATFORM_WREMOTELY_ETL_IMAGE"

          cd "$QA_REPO_DIR/airflow"
          DATA_PLATFORM_ENV_FILE="$QA_DATA_PLATFORM_ENV_FILE" docker compose --env-file "$QA_DATA_PLATFORM_ENV_FILE" -f docker-compose.yml config --quiet
          DATA_PLATFORM_ENV_FILE="$QA_DATA_PLATFORM_ENV_FILE" docker compose --env-file "$QA_DATA_PLATFORM_ENV_FILE" -f docker-compose.yml pull
          DATA_PLATFORM_ENV_FILE="$QA_DATA_PLATFORM_ENV_FILE" docker compose --env-file "$QA_DATA_PLATFORM_ENV_FILE" -f docker-compose.yml up -d --force-recreate --remove-orphans --wait --wait-timeout 300
          DATA_PLATFORM_ENV_FILE="$QA_DATA_PLATFORM_ENV_FILE" docker compose --env-file "$QA_DATA_PLATFORM_ENV_FILE" -f docker-compose.yml ps

      - name: QA Airflow smoke check
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source "$QA_IMAGE_ENV_FILE"
          set +a

          cd "$QA_REPO_DIR/airflow"
          expected_dag_ids=(
            etl__personal_finance
            etl__wremotely
            maintenance__wremotely_lifecycle
            publish__wremotely_serving
            repair__wremotely_job_urls
          )

          missing_dag_ids=()
          for attempt in {1..24}; do
            dag_list="$(
              DATA_PLATFORM_ENV_FILE="$QA_DATA_PLATFORM_ENV_FILE" \
                docker compose --env-file "$QA_DATA_PLATFORM_ENV_FILE" -f docker-compose.yml \
                exec -T scheduler airflow dags list
            )"
            missing_dag_ids=()
            for dag_id in "${expected_dag_ids[@]}"; do
              if ! grep -Fq "$dag_id" <<< "$dag_list"; then
                missing_dag_ids+=("$dag_id")
              fi
            done
            if [[ "${#missing_dag_ids[@]}" -eq 0 ]]; then
              break
            fi

            echo "Waiting for Airflow DAG serialization; attempt $attempt/24; missing: ${missing_dag_ids[*]}"
            sleep 5
          done
          printf '%s\n' "$dag_list"
          if [[ "${#missing_dag_ids[@]}" -ne 0 ]]; then
            echo "::error::Expected deployed DAGs are missing: ${missing_dag_ids[*]}"
            exit 1
          fi

          import_errors="$(
            DATA_PLATFORM_ENV_FILE="$QA_DATA_PLATFORM_ENV_FILE" \
              docker compose --env-file "$QA_DATA_PLATFORM_ENV_FILE" -f docker-compose.yml \
              exec -T scheduler airflow dags list-import-errors
          )"
          printf '%s\n' "$import_errors"
          if ! grep -Fq "No data found" <<< "$import_errors"; then
            echo "::error::Airflow reports DAG import errors."
            exit 1
          fi
